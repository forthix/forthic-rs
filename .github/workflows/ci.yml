name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: build & test (Rust ${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - uses: Swatinem/rust-cache@v2

      - name: Build (all features)
        run: cargo build --all-features

      - name: Test (all features)
        run: cargo test --all-features

      - name: Smoke-test the JSON-RPC server binary
        run: |
          cargo run --features jsonrpc --bin forthic-jsonrpc -- --port 18999 &
          SERVER_PID=$!
          for _ in $(seq 1 50); do
            curl -s -o /dev/null -X POST 127.0.0.1:18999/rpc \
              -H 'Content-Type: application/json' \
              -d '{"jsonrpc":"2.0","id":0,"method":"listModules","params":{}}' && break
            sleep 0.2
          done
          RESULT=$(curl -s -X POST 127.0.0.1:18999/rpc \
            -H 'Content-Type: application/json' \
            -d '{"jsonrpc":"2.0","id":1,"method":"executeWord","params":{"word_name":"+","stack":[{"int_value":40},{"int_value":2}]}}')
          kill $SERVER_PID
          echo "$RESULT" | grep -q '"int_value":42' || { echo "smoke failed: $RESULT"; exit 1; }
          echo "smoke OK: $RESULT"

  lint:
    name: fmt & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy --all-features --all-targets -- -D warnings
